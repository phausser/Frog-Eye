name: CD

on:
  push:
    branches: [main]

# GitHub Pages deployment requires these permissions
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel in-flight runs on new push
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # Sets Vite base path to /<repo-name>/ for GitHub Pages project sites
          VITE_BASE_URL: /${{ github.event.repository.name }}/
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
