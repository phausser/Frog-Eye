<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frog Eye</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; background: #000; font-family: monospace; }
    #game-canvas { display: block; width: 100vw; height: 100vh; }

    /* ── Nose strip — separates left/right eye viewports ── */
    #nose {
      position: fixed; top: 0; left: 50%;
      transform: translateX(-50%);
      width: 12px; height: 100vh;
      background: #000;
      pointer-events: none;
      z-index: 5;
    }

    /* ── HUD bar ── */
    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 20px;
      background: rgba(0, 0, 0, 0.45);
      color: #fff;
      font-size: 15px;
      letter-spacing: 0.05em;
      pointer-events: none;
      z-index: 10;
    }
    #hud-right { display: flex; gap: 18px; }
    #hud-timer { min-width: 2ch; text-align: right; }

    @keyframes hud-pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
    .hud-timer-low { animation: hud-pulse 0.5s ease-in-out infinite; }

    /* ── Minimap ── */
    #minimap-wrap {
      position: fixed; bottom: 20px; right: 20px;
      pointer-events: none;
      z-index: 20;
    }
    #minimap-label {
      display: block;
      text-align: center;
      color: rgba(255, 255, 255, 0.45);
      font-size: 10px;
      font-family: monospace;
      letter-spacing: 3px;
      margin-bottom: 4px;
    }
    #minimap {
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: rgba(0, 0, 0, 0.55);
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <div id="nose"></div>

  <div id="hud">
    <span id="hud-lives">♥ ♥ ♥</span>
    <span id="hud-score">00000</span>
    <div id="hud-right">
      <span id="hud-level">L1</span>
      <span id="hud-timer">60</span>
    </div>
  </div>

  <div id="minimap-wrap">
    <span id="minimap-label">MAP</span>
    <div id="minimap"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
