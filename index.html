<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frog Eye</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; background: #000; font-family: monospace; }
    #game-canvas { display: block; width: 100vw; height: 100vh; }

    /* ── Nose strip — separates left/right eye viewports ── */
    #nose {
      position: fixed; top: 0; left: 50%;
      transform: translateX(-50%);
      width: 12px; height: 100vh;
      background: #000;
      pointer-events: none;
      z-index: 5;
    }

    /* ── HUD bar ── */
    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 20px;
      background: rgba(0, 0, 0, 0.45);
      color: #fff;
      font-size: 15px;
      letter-spacing: 0.05em;
      pointer-events: none;
      z-index: 10;
    }
    #hud-right { display: flex; gap: 18px; }
    #hud-timer { min-width: 2ch; text-align: right; }

    @keyframes hud-pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
    .hud-timer-low { animation: hud-pulse 0.5s ease-in-out infinite; }

    /* ── Screens ── */
    .screen {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0, 0, 0, 0.78);
      color: #fff;
      font-family: monospace;
      z-index: 100;
      text-align: center;
    }
    .screen.hidden { display: none; }

    .screen-levelup {
      background: rgba(0, 0, 0, 0.55);
      pointer-events: none;
    }

    .screen-content { display: flex; flex-direction: column; gap: 16px; align-items: center; }

    .screen-title {
      font-size: clamp(2.2rem, 8vw, 4.5rem);
      letter-spacing: 0.18em;
      color: #9fffb0;
      text-shadow: 0 0 24px rgba(80, 255, 120, 0.55);
      margin: 0;
    }

    .screen-levelup .screen-title { color: #ffe066; text-shadow: 0 0 20px rgba(255, 200, 0, 0.6); }

    .screen-sub {
      font-size: clamp(0.75rem, 2.5vw, 1rem);
      color: rgba(255, 255, 255, 0.55);
      letter-spacing: 0.12em;
      margin: 0;
    }

    .screen-score {
      font-size: clamp(1rem, 3.5vw, 1.5rem);
      color: rgba(255, 255, 255, 0.85);
      letter-spacing: 0.1em;
      margin: 0;
    }

    .screen-levelnum {
      font-size: clamp(3rem, 12vw, 7rem);
      color: #ffe066;
      line-height: 1;
      margin: 0;
    }

    @keyframes blink-prompt {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }
    .screen-prompt {
      font-size: clamp(0.7rem, 2.2vw, 0.9rem);
      letter-spacing: 0.2em;
      color: rgba(255, 255, 255, 0.6);
      animation: blink-prompt 1.2s ease-in-out infinite;
      margin: 0;
    }

    /* ── Minimap ── */
    #minimap-wrap {
      position: fixed; bottom: 20px; right: 20px;
      pointer-events: none;
      z-index: 20;
    }
    #minimap-label {
      display: block;
      text-align: center;
      color: rgba(255, 255, 255, 0.45);
      font-size: 10px;
      font-family: monospace;
      letter-spacing: 3px;
      margin-bottom: 4px;
    }
    #minimap {
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: rgba(0, 0, 0, 0.55);
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <div id="nose"></div>

  <div id="hud">
    <span id="hud-lives">♥ ♥ ♥</span>
    <span id="hud-score">00000</span>
    <div id="hud-right">
      <span id="hud-level">L1</span>
      <span id="hud-timer">60</span>
    </div>
  </div>

  <!-- Start screen -->
  <div id="screen-start" class="screen">
    <div class="screen-content">
      <h1 class="screen-title">FROG EYE</h1>
      <p class="screen-sub">See the world through frog eyes</p>
      <p class="screen-prompt">TAP OR PRESS ANY KEY</p>
    </div>
  </div>

  <!-- Game Over screen -->
  <div id="screen-gameover" class="screen hidden">
    <div class="screen-content">
      <h1 class="screen-title">GAME OVER</h1>
      <p class="screen-score">SCORE &nbsp;<span id="go-score">00000</span></p>
      <p class="screen-prompt">TAP OR PRESS ANY KEY</p>
    </div>
  </div>

  <!-- Level-Up overlay (non-blocking) -->
  <div id="screen-levelup" class="screen screen-levelup hidden">
    <div class="screen-content">
      <h1 class="screen-title">LEVEL UP</h1>
      <p class="screen-levelnum" id="lu-level">2</p>
    </div>
  </div>

  <div id="minimap-wrap">
    <span id="minimap-label">MAP</span>
    <div id="minimap"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
