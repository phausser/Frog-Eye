<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frog Eye</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; background: #000; font-family: monospace; }
    #game-canvas { display: block; width: 100vw; height: 100vh; }
    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 20px;
      color: #a0e060;
      font-size: 14px;
      pointer-events: none;
      z-index: 10;
    }
    /* Frog nose — separates left and right eye viewports */
    #nose {
      position: fixed; top: 0; left: 50%;
      transform: translateX(-50%);
      width: 12px; height: 100vh;
      background: #000;
      pointer-events: none;
      z-index: 5;
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <div id="nose"></div>
  <div id="hud">
    <span id="hud-lives">♥ ♥ ♥</span>
    <span id="hud-score">0</span>
    <span id="hud-timer">60</span>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
